<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>
    <style>
        body { font-family: Arial, sans-serif; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Welcome to My Website</h1>
    <p>This is your custom website content.</p>
    
    <button onclick="alert('Hello! Button clicked!')">Click Me</button>
</body>
</html>
