<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>
    <style>
        body { font-family: Arial, sans-serif; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #square {
            width: 200px;
            height: 200px;
            background-color: blue;
            margin-top: 20px;
            display: none;
        }
    </style>
    <script>
        function makeSquare() {
            document.getElementById('square').style.display = 'block';
            alert('Hello! Button clicked!');
        }
    </script>
</head>
<body>
    <h1>Welcome to My Website</h1>
    <p>This is your custom website content.</p>
    
    <button onclick="makeSquare()">Click Me</button>
    <div id="square"></div>
</body>
</html>
