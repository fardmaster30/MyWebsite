<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>
    <style>
        body { font-family: Arial, sans-serif; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .square {
            width: 200px;
            height: 200px;
            margin-top: 20px;
            display: inline-block;
            margin-right: 10px;
        }
        .image {
            width: 200px;
            height: 200px;
            margin-top: 20px;
            display: inline-block;
            margin-right: 10px;
            object-fit: cover;
        }
    </style>
    <script>
        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        function makeSquare() {
            const randomChance = Math.random();
            
            if (randomChance < 0.05) {
                // 5% chance to add an image
                const newImage = document.createElement('img');
                newImage.className = 'image';
                newImage.src = 'https://via.placeholder.com/200';
                document.body.appendChild(newImage);
            } else {
                // 95% chance to add a square
                const newSquare = document.createElement('div');
                newSquare.className = 'square';
                newSquare.style.backgroundColor = getRandomColor();
                document.body.appendChild(newSquare);
            }
        }
    </script>
</head>
<body>
    <h1>Welcome to My Website</h1>
    <p>This is the start of squares.</p>
    
    <button onclick="makeSquare()">Click Me</button>
    <div id="squares-container"></div>
    <p>This is the end of squares.</p>
</body>
</html>
